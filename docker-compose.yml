services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: propsbasket
      POSTGRES_USER: propsbasket
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-propsbasket}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U propsbasket"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql+asyncpg://propsbasket:${POSTGRES_PASSWORD:-propsbasket}@postgres:5432/propsbasket

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000

volumes:
  postgres_data:
